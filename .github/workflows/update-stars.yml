name: Update GitHub Stats

on:
  schedule:
    # Run every Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  update-stats:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Update GitHub star counts
        run: node scripts/update-stars.js

      - name: Update YouTube video views
        run: node scripts/update-youtube-views.js

      - name: Update YouTube subscriber count
        run: node scripts/update-youtube-subscribers.js

      - name: Check for changes
        id: git-check
        run: |
          if git diff --quiet app/components/projects.tsx app/components/latest-video.tsx; then
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            echo "changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push if changed
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add app/components/projects.tsx app/components/latest-video.tsx
          git commit -m "chore: update GitHub stars and YouTube stats" -m "Automated weekly update of repository star counts, video views, and subscriber count." -m "🤖 Generated by GitHub Actions"
          git push
